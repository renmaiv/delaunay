# Render blueprint for the FastAPI backend (judge-only).
# Deploy: Render dashboard → New → Blueprint → pick this repo, or New → Web
# Service → Docker. Set ANTHROPIC_API_KEY and ALLOWED_ORIGINS in the dashboard.
services:
  - type: web
    name: tonality-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Set your real key in the Render dashboard (kept out of git).
      - key: ANTHROPIC_API_KEY
        sync: false
      # The Vercel site origin(s) allowed to call this API. Comma-separated,
      # or "*" for any. e.g. https://tonality.vercel.app
      - key: ALLOWED_ORIGINS
        value: "*"
